<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Sign Up</title>
  <style>
    /* Genel stil */
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://picsum.photos/1920/1080?blur') no-repeat center center/cover;
      overflow: hidden;
    }

    /* Arka plan overlay */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: -1;
    }

    /* Container */
    .container {
      width: 400px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      animation: fadeIn 1.5s ease;
    }

    /* Başlık */
    .container h2 {
      text-align: center;
      color: #fff;
      margin-bottom: 20px;
      animation: slideDown 1s ease;
    }

    /* Input alanları */
    .input-group {
      margin-bottom: 15px;
      position: relative;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      outline: none;
      background: rgba(255,255,255,0.8);
      font-size: 14px;
      transition: 0.3s;
    }

    .input-group input:focus {
      background: #fff;
      box-shadow: 0 0 10px #00c6ff;
    }

    /* Buton */
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    /* Toggle link */
    .toggle {
      text-align: center;
      margin-top: 15px;
      color: #fff;
      cursor: pointer;
      transition: color 0.3s;
    }

    .toggle:hover {
      color: #00c6ff;
    }

    /* Animasyonlar */
    @keyframes fadeIn {
      from {opacity: 0; transform: scale(0.9);}
      to {opacity: 1; transform: scale(1);}
    }

    @keyframes slideDown {
      from {opacity: 0; transform: translateY(-30px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* Gizleme */
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login Form -->
    <div id="loginForm">
      <h2>Giriş Yap</h2>
      <div class="input-group">
        <input type="text" placeholder="Kullanıcı Adı">
      </div>
      <div class="input-group">
        <input type="password" placeholder="Şifre">
      </div>
      <button class="btn" onclick="login()">Giriş</button>
      <div class="toggle" onclick="toggleForms()">Hesabın yok mu? Kayıt Ol</div>
    </div>

    <!-- Sign Up Form -->
    <div id="signupForm" class="hidden">
      <h2>Kayıt Ol</h2>
      <div class="input-group">
        <input type="text" placeholder="Kullanıcı Adı">
      </div>
      <div class="input-group">
        <input type="email" placeholder="Email">
      </div>
      <div class="input-group">
        <input type="password" placeholder="Şifre">
      </div>
      <button class="btn" onclick="signup()">Kayıt Ol</button>
      <div class="toggle" onclick="toggleForms()">Zaten hesabın var mı? Giriş Yap</div>
    </div>
  </div>

  <script>
    function toggleForms() {
      document.getElementById("loginForm").classList.toggle("hidden");
      document.getElementById("signupForm").classList.toggle("hidden");
    }

    function login() {
      alert("Test");
    }

    function signup() {
      alert("Test");
    }
  </script>
</body>
</html>
